<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Website cá nhân</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            margin-bottom: 5px;
            font-size: 28px;
        }

        h2 {
            margin-bottom: 15px;
            font-weight: 400;
        }

        .intro {
            font-style: italic;
            margin-bottom: 20px;
            color: #ffe082;
        }

        .info {
            text-align: left;
            margin-top: 15px;
        }

        .info p {
            margin: 10px 0;
            font-size: 16px;
        }

        .label {
            font-weight: bold;
            color: #ffe082;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            background: white;
            color: #333;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffe082;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>👋 Hello!</h1>
    <h2>Nguyen Cuong Thinh</h2>

    <div class="intro">
        ✨ Một chàng trai đẹp trai, tài năng và đầy tham vọng trong ngành IT 😎
    </div>

    <div class="info">
        <p><span class="label">Lớp:</span> 0102</p>
        <p><span class="label">Trường:</span> Văn Lang University</p>
        <p><span class="label">Ngành:</span> Công nghệ thông tin</p>
    </div>

    <a href="#" class="btn">🔥 Follow Me</a>
</div>

</body>
</html>
